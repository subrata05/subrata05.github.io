<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Portfolio</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Interactive Background Layers -->
  <div class="bg-grid" id="bgGrid"></div>
  <div class="bg-gradient"></div>
  <div class="bg-noise"></div>
  <div class="spotlight" id="spotlight"></div>

  <!-- Animated Lines -->
  <div class="accent-line accent-1"></div>
  <div class="accent-line accent-2"></div>
  <div class="accent-line accent-3"></div>

  <!-- Glow Points -->
  <div class="glow-point gp-1"></div>
  <div class="glow-point gp-2"></div>

  <!-- Cursor Trail -->
  <div class="cursor-trail" id="cursorTrail"></div>

  <!-- Ripple Container -->
  <div class="ripple-container" id="rippleContainer"></div>

  <!-- Glitter Container -->
  <div class="glitter-container" id="glitterContainer"></div>

  <div class="card" id="mainCard">
    <!-- Corner Accents -->
    <div class="corner-accent top-left"></div>
    <div class="corner-accent bottom-right"></div>

    <!-- Contact Bar -->
    <div class="contact-bar">
      <div class="contact-left">
        <div class="contact-item magnetic" data-magnetic>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
          <a href="mailto:ss9sarkar@gmail.com">ss9sarkar@gmail.com</a>
        </div>
        <div class="contact-item magnetic" data-magnetic>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
          <span>Assam, India</span>
        </div>
      </div>
      <div class="timestamp" id="timestamp">--:--:--</div>
    </div>

    <!-- Profile -->
    <div class="profile">
      <div class="avatar-wrap magnetic" data-magnetic>
        <div class="avatar-placeholder">
          <img src="me.jpeg" alt="Subrata Sarkar"
            style="width:100%; height:100%; object-fit:cover; border-radius:50%;" />
        </div>
        <div class="avatar-ring"></div>
        <div class="avatar-glow"></div>
      </div>
      <div class="profile-text">
        <h1 class="name magnetic-text" data-magnetic-text>Subrata <em>Sarkar</em></h1>
        <p class="tagline">Embedded System Engineer | Firmware Developer </p>
        <p class="bio">From bare-metal drivers to complete embedded applications.</p>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"><span>Find me online</span></div>

    <!-- Social Links -->
    <div class="links">

      <a href="https://linkedin.com/in/subratasarkar-ss" target="_blank" class="link-btn magnetic" data-magnetic
        rel="noopener noreferrer">
        <div class="icon-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z" />
            <circle cx="4" cy="4" r="2" />
          </svg>
        </div>
        <span>LinkedIn</span>
      </a>

      <a href="https://github.com/subrata05" target="_blank" class="link-btn magnetic" data-magnetic
        rel="noopener noreferrer">
        <div class="icon-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
          </svg>
        </div>
        <span>GitHub</span>
      </a>

      <a href="https://instagram.com/sxvyte" target="_blank" class="link-btn magnetic" data-magnetic
        rel="noopener noreferrer">
        <div class="icon-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="20" rx="5" />
            <circle cx="12" cy="12" r="4" />
            <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" />
          </svg>
        </div>
        <span>Instagram</span>
      </a>

      <a href="https://medium.com/@sxvyte" target="_blank" class="link-btn magnetic" data-magnetic
        rel="noopener noreferrer">
        <div class="icon-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M13.54 12a6.8 6.8 0 0 1-6.77 6.82A6.8 6.8 0 0 1 0 12a6.8 6.8 0 0 1 6.77-6.82A6.8 6.8 0 0 1 13.54 12zm7.42 0c0 3.54-1.51 6.42-3.38 6.42-1.87 0-3.39-2.88-3.39-6.42s1.52-6.42 3.39-6.42 3.38 2.88 3.38 6.42M24 12c0 3.17-.53 5.75-1.19 5.75-.66 0-1.19-2.58-1.19-5.75s.53-5.75 1.19-5.75C23.47 6.25 24 8.83 24 12z" />
          </svg>
        </div>
        <span>Medium</span>
      </a>

      <a href="https://sxvyte.substack.com" target="_blank" class="link-btn magnetic" data-magnetic
        rel="noopener noreferrer">
        <div class="icon-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z" />
          </svg>
        </div>
        <span>Substack</span>
      </a>

      <a href="https://pinterest.com/sxvyte" target="_blank" class="link-btn magnetic" data-magnetic
        rel="noopener noreferrer">
        <div class="icon-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z" />
          </svg>
        </div>
        <span>Pinterest</span>
      </a>

      <a href="resume.pdf" target="_blank" class="link-btn magnetic resume" data-magnetic rel="noopener noreferrer" style="grid-column: 1 / -1">
        <div class="icon-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
        </div>
        <span>Resume</span>
      </a>

    </div>

    <p class="footer-note">Click any card to open the profile</p>

  </div>

  <script src="script.js"></script>

</body>

</html>
